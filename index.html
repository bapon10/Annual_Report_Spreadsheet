<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Annual Report 2025-26 - Hindustani Music Vocal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            .no-print { display: none; }
            body { background: white; padding: 0; }
            .print-container { box-shadow: none; border: none; max-width: 100%; }
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
        .cell-input:focus {
            background-color: #f0f9ff;
            outline: 2px solid #3b82f6;
            outline-offset: -2px;
        }
        tr:hover td {
            background-color: #f9fafb;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen py-8 px-4">
    <div class="max-w-6xl mx-auto bg-white shadow-xl rounded-lg overflow-hidden print-container">
        
        <!-- Header Section -->
        <header class="bg-indigo-900 text-white p-8 text-center relative">
            <h1 class="text-3xl font-bold uppercase tracking-wider">Annual Report 2025-26</h1>
            <h2 class="text-xl font-light mt-2 italic">Hindustani Music Vocal</h2>
            <div class="absolute top-4 right-4 no-print">
                <span id="saveStatus" class="text-xs bg-indigo-800 px-2 py-1 rounded opacity-0 transition-opacity duration-500 font-medium">Changes Saved</span>
            </div>
        </header>

        <div class="p-6 flex flex-col md:flex-row gap-8">
            <!-- Main Spreadsheet Area -->
            <div class="flex-grow overflow-x-auto">
                <table class="w-full border-collapse border border-gray-300 text-sm">
                    <thead>
                        <tr class="bg-gray-200 text-gray-700">
                            <th class="border border-gray-300 p-2 w-12 text-center">S.NO</th>
                            <th class="border border-gray-300 p-2 text-left">Name</th>
                            <th class="border border-gray-300 p-2 w-20 text-center">P 1</th>
                            <th class="border border-gray-300 p-2 w-20 text-center">HY</th>
                            <th class="border border-gray-300 p-2 w-20 text-center">P 2</th>
                            <th class="border border-gray-300 p-2 w-20 text-center">Annual</th>
                            <th class="border border-gray-300 p-2 w-20 bg-indigo-50 text-center font-bold">Total</th>
                        </tr>
                    </thead>
                    <tbody id="studentTable">
                        <!-- Rows generated by JS -->
                    </tbody>
                </table>
                
                <!-- Add Row Button -->
                <div class="no-print mt-4">
                    <button onclick="addNewRow()" class="flex items-center gap-2 text-indigo-600 hover:text-indigo-800 font-bold text-sm bg-indigo-50 px-4 py-2 rounded-lg transition-colors border border-indigo-100">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                        Add New Student Entry
                    </button>
                </div>
            </div>

            <!-- Sidebar: Dashboard & Actions -->
            <div class="w-full md:w-64 flex flex-col gap-6">
                <!-- Dashboard -->
                <div class="bg-gray-50 p-6 rounded-lg border border-gray-200 shadow-sm">
                    <h3 class="text-lg font-bold text-indigo-900 mb-4 border-b pb-2">Stats</h3>
                    <div class="space-y-4">
                        <div class="flex justify-between items-end">
                            <p class="text-xs text-gray-500 uppercase font-bold">Total Students</p>
                            <p id="totalStudentsDisplay" class="text-xl font-mono font-bold">0</p>
                        </div>
                        <div class="flex justify-between items-end text-green-700">
                            <p class="text-xs uppercase font-bold">Pass (≥35%)</p>
                            <p id="passCount" class="text-xl font-mono font-bold">0</p>
                        </div>
                        <div class="flex justify-between items-end text-red-600">
                            <p class="text-xs uppercase font-bold">Fail</p>
                            <p id="failCount" class="text-xl font-mono font-bold">0</p>
                        </div>
                        <div class="flex justify-between items-end border-t pt-2 text-indigo-700">
                            <p class="text-xs uppercase font-bold">Avg. Total</p>
                            <p id="avgScore" class="text-xl font-mono font-bold">0.0</p>
                        </div>
                    </div>
                </div>

                <!-- Principal Signature Area -->
                <div class="mt-4 pt-8 text-center border-t-2 border-dashed border-gray-300">
                    <div class="h-12 flex items-end justify-center">
                        <span class="text-gray-300 text-xs italic mb-2">Seal & Signature</span>
                    </div>
                    <div class="border-t border-gray-800 w-40 mx-auto"></div>
                    <p class="text-xs font-bold mt-2 uppercase">Principal</p>
                </div>

                <!-- Action Buttons -->
                <div class="no-print space-y-2 mt-4">
                    <button onclick="window.print()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded transition flex items-center justify-center gap-2">
                        Print PDF Report
                    </button>
                    
                    <div class="border-t border-gray-200 my-4 pt-4">
                        <p class="text-[10px] text-gray-400 font-bold uppercase mb-2">Data Management</p>
                        <button onclick="saveToFile()" class="w-full bg-blue-600 hover:bg-blue-700 text-white text-sm font-bold py-2 px-4 rounded transition mb-2">
                            Save Backup File
                        </button>
                        <label class="w-full bg-gray-600 hover:bg-gray-700 text-white text-sm font-bold py-2 px-4 rounded transition flex items-center justify-center cursor-pointer mb-2">
                            Load Backup File
                            <input type="file" id="loadInput" class="hidden" accept=".json" onchange="loadFromFile(event)">
                        </label>
                        <button onclick="exportToCSV()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 px-4 rounded transition text-sm">
                            Export to Excel (.csv)
                        </button>
                    </div>
                    
                    <button onclick="clearData()" class="w-full border border-red-200 text-red-500 hover:bg-red-50 py-1 rounded text-xs mt-4 transition">
                        Reset All Data
                    </button>
                </div>
            </div>
        </div>
        
        <footer class="bg-gray-50 p-4 text-center text-gray-400 text-xs no-print flex justify-between px-8">
            <span>Progress auto-saves to browser</span>
            <span>Annual Report System 2025-26</span>
        </footer>
    </div>

    <script>
        const tableBody = document.getElementById('studentTable');
        const statusEl = document.getElementById('saveStatus');
        const PASS_MARK = 140; 
        const STORAGE_KEY = 'vocal_report_data_2025_v2';

        // Load existing data or start with 30 empty rows
        let reportData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || Array(30).fill().map(() => ({
            name: '', p1: '', hy: '', p2: '', an: ''
        }));

        function createTable() {
            tableBody.innerHTML = '';
            reportData.forEach((student, index) => {
                appendRowToDOM(student, index);
            });
            updateStats(false);
        }

        function appendRowToDOM(student, index) {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td class="border border-gray-300 p-0 text-center bg-gray-50 text-gray-400 font-mono text-xs">${index + 1}</td>
                <td class="border border-gray-300 p-0">
                    <input type="text" value="${student.name || ''}" data-idx="${index}" class="name-input cell-input w-full p-2 border-none bg-transparent">
                </td>
                <td class="border border-gray-300 p-0">
                    <input type="number" value="${student.p1 || ''}" data-idx="${index}" class="mark-input cell-input w-full p-2 border-none text-center bg-transparent">
                </td>
                <td class="border border-gray-300 p-0">
                    <input type="number" value="${student.hy || ''}" data-idx="${index}" class="mark-input cell-input w-full p-2 border-none text-center bg-transparent">
                </td>
                <td class="border border-gray-300 p-0">
                    <input type="number" value="${student.p2 || ''}" data-idx="${index}" class="mark-input cell-input w-full p-2 border-none text-center bg-transparent">
                </td>
                <td class="border border-gray-300 p-0">
                    <input type="number" value="${student.an || ''}" data-idx="${index}" class="mark-input cell-input w-full p-2 border-none text-center bg-transparent">
                </td>
                <td class="border border-gray-300 p-2 text-center font-bold bg-indigo-50 row-total">0</td>
            `;
            tableBody.appendChild(row);
        }

        function addNewRow() {
            const newEntry = { name: '', p1: '', hy: '', p2: '', an: '' };
            reportData.push(newEntry);
            appendRowToDOM(newEntry, reportData.length - 1);
            updateStats(true);
            
            // Focus on the new name input
            const inputs = tableBody.querySelectorAll('.name-input');
            inputs[inputs.length - 1].focus();
        }

        function updateStats(shouldSave = true) {
            const rows = tableBody.querySelectorAll('tr');
            let totalPass = 0, totalFail = 0, grandTotal = 0, activeCount = 0;

            rows.forEach((row, i) => {
                const nameInput = row.querySelector('.name-input');
                const markInputs = row.querySelectorAll('.mark-input');
                const marks = Array.from(markInputs).map(input => parseFloat(input.value) || 0);
                const total = marks.reduce((a, b) => a + b, 0);
                const totalCell = row.querySelector('.row-total');
                totalCell.textContent = total;

                // Sync the global object
                reportData[i].name = nameInput.value;
                reportData[i].p1 = markInputs[0].value;
                reportData[i].hy = markInputs[1].value;
                reportData[i].p2 = markInputs[2].value;
                reportData[i].an = markInputs[3].value;

                // Check if row has any content to be considered in stats
                if (reportData[i].name.trim() !== "" || marks.some(m => m > 0)) {
                    activeCount++;
                    if (total >= PASS_MARK) {
                        totalPass++;
                        totalCell.style.color = '#3730a3';
                    } else {
                        totalFail++;
                        totalCell.style.color = '#dc2626';
                    }
                    grandTotal += total;
                }
            });

            document.getElementById('totalStudentsDisplay').textContent = activeCount;
            document.getElementById('passCount').textContent = totalPass;
            document.getElementById('failCount').textContent = totalFail;
            document.getElementById('avgScore').textContent = activeCount > 0 ? (grandTotal / activeCount).toFixed(1) : "0.0";

            if (shouldSave) {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(reportData));
                statusEl.style.opacity = '1';
                setTimeout(() => statusEl.style.opacity = '0', 2000);
            }
        }

        function saveToFile() {
            const blob = new Blob([JSON.stringify(reportData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Vocal_Music_Backup_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function loadFromFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (Array.isArray(data)) {
                        reportData = data;
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(reportData));
                        createTable();
                        alert("Data loaded successfully!");
                    }
                } catch (err) {
                    alert("Error: File is not a valid backup.");
                }
            };
            reader.readAsText(file);
        }

        function exportToCSV() {
            let csv = "S.NO,Name,P1,HY,P2,Annual,Total\n";
            reportData.forEach((row, i) => {
                const marks = [row.p1 || 0, row.hy || 0, row.p2 || 0, row.an || 0];
                const total = marks.reduce((a, b) => parseFloat(a) + parseFloat(b), 0);
                csv += `${i+1},"${row.name.replace(/"/g, '""')}",${row.p1 || 0},${row.hy || 0},${row.p2 || 0},${row.an || 0},${total}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Music_Report_Export.csv`;
            a.click();
        }

        function clearData() {
            if (confirm("Reset everything? Current data will be deleted.")) {
                reportData = Array(30).fill().map(() => ({ name: '', p1: '', hy: '', p2: '', an: '' }));
                localStorage.removeItem(STORAGE_KEY);
                createTable();
            }
        }

        tableBody.addEventListener('input', () => updateStats(true));
        createTable();
    </script>
</body>
</html>
