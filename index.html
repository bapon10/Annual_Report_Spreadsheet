<!DOCTYPE html>
<html lang="en" id="main-html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Annual Report Dashboard - Nirmal Deep School</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] },
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; color: black !important; }
        }

        /* PDF Generation Specific Styles */
        .pdf-export-mode {
            width: 1050px !important; /* Fixed width for better PDF scaling */
            padding: 20px !important;
            background: white !important;
            color: black !important;
        }
        .pdf-export-mode .no-print { display: none !important; }
        .pdf-export-mode .data-input { 
            border: none !important; 
            background: transparent !important; 
            padding: 0 !important;
            box-shadow: none !important;
        }
        .pdf-export-mode #report-main-container { max-width: 100% !important; margin: 0 !important; }

        #pdf-watermark {
            display: none;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(-30deg);
            opacity: 0.05;
            pointer-events: none;
            text-align: center;
            width: 100%;
            z-index: 0;
        }
        .pdf-export-mode #pdf-watermark { display: block !important; }

        .data-input {
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
        }
        .dark .data-input { border-color: #334155; }
        .data-input:focus { border-color: #6366f1 !important; outline: none; box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2); }
        
        .section-row { background-color: #f8fafc; }
        .dark .section-row { background-color: #1e293b; }

        .drag-handle { cursor: grab; color: #cbd5e1; }
        .dragging { opacity: 0.5; }
    </style>
</head>
<body class="p-4 md:p-10 bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 transition-colors duration-300">

    <div id="report-main-container" class="relative max-w-7xl mx-auto">
        
        <div id="pdf-watermark" class="uppercase">
            <h1 class="text-8xl font-black">Nirmal Deep School</h1>
            <p id="targetWatermarkName" class="text-3xl font-bold">Prepared by: Teacher Name</p>
        </div>

        <div class="flex flex-col lg:flex-row gap-8">
            <!-- Table Side -->
            <div id="print-area" class="flex-grow space-y-6">
                
                <!-- Header -->
                <div class="flex justify-between items-end border-b border-slate-200 dark:border-slate-800 pb-6">
                    <div>
                        <h1 class="text-3xl font-extrabold tracking-tight">Hindustani Music Vocal</h1>
                        <p class="text-slate-500 font-medium">Annual Performance Report 2025-26</p>
                    </div>
                    <div class="no-print flex gap-2">
                        <button onclick="toggleDarkMode()" class="p-2 rounded-lg bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 shadow-sm">
                            <svg class="w-5 h-5 text-indigo-500" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
                        </button>
                    </div>
                </div>

                <!-- Stats -->
                <div class="grid grid-cols-4 gap-4">
                    <div class="p-4 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl shadow-sm">
                        <p class="text-[10px] font-bold text-slate-400 uppercase">Students</p>
                        <p id="statTotal" class="text-2xl font-bold">0</p>
                    </div>
                    <div class="p-4 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl shadow-sm">
                        <p class="text-[10px] font-bold text-emerald-500 uppercase">Passed</p>
                        <p id="statPass" class="text-2xl font-bold text-emerald-600">0</p>
                    </div>
                    <div class="p-4 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl shadow-sm">
                        <p class="text-[10px] font-bold text-rose-500 uppercase">Failed</p>
                        <p id="statFail" class="text-2xl font-bold text-rose-600">0</p>
                    </div>
                    <div class="p-4 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl shadow-sm">
                        <p class="text-[10px] font-bold text-indigo-500 uppercase">Avg</p>
                        <p id="statAvg" class="text-2xl font-bold text-indigo-600">0.0</p>
                    </div>
                </div>

                <!-- Main Table -->
                <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl overflow-hidden shadow-sm">
                    <table class="w-full text-left border-collapse" id="mainTable">
                        <thead class="bg-slate-50 dark:bg-slate-800/50">
                            <tr>
                                <th class="px-4 py-3 text-[10px] font-bold text-slate-400 uppercase w-12 text-center no-print">Move</th>
                                <th class="px-4 py-3 text-[10px] font-bold text-slate-400 uppercase w-12 text-center">#</th>
                                <th class="px-4 py-3 text-[10px] font-bold text-slate-400 uppercase">Name</th>
                                <th class="px-2 py-3 text-[10px] font-bold text-slate-400 uppercase text-center w-20">P1</th>
                                <th class="px-2 py-3 text-[10px] font-bold text-slate-400 uppercase text-center w-20">HY</th>
                                <th class="px-2 py-3 text-[10px] font-bold text-slate-400 uppercase text-center w-20">P2</th>
                                <th class="px-2 py-3 text-[10px] font-bold text-slate-400 uppercase text-center w-20">Annual</th>
                                <th class="px-4 py-3 text-[10px] font-bold text-slate-400 uppercase text-center w-24 bg-slate-100/50 dark:bg-slate-800">Total</th>
                                <th class="px-2 py-3 w-10 no-print text-center"></th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-slate-100 dark:divide-slate-800"></tbody>
                    </table>
                </div>

                <div class="flex gap-4 no-print">
                    <button onclick="addRow('student')" class="flex-grow py-3 border-2 border-dashed border-slate-200 dark:border-slate-800 rounded-xl text-slate-400 font-bold hover:bg-indigo-50 dark:hover:bg-indigo-900/10 transition-all">+ Add Student</button>
                    <button onclick="addRow('section')" class="flex-grow py-3 border-2 border-dashed border-slate-200 dark:border-slate-800 rounded-xl text-slate-400 font-bold hover:bg-amber-50 dark:hover:bg-amber-900/10 transition-all">+ Add Section</button>
                </div>

                <!-- Signatures -->
                <div class="pt-10 flex justify-between items-end">
                    <div class="text-center">
                        <div class="w-32 border-b border-slate-400 mb-1"></div>
                        <p class="text-[9px] uppercase font-bold text-slate-400 tracking-widest">Teacher</p>
                    </div>
                    <div class="text-center">
                        <div class="w-48 border-b-2 border-slate-900 dark:border-slate-200 mb-1"></div>
                        <p class="text-[9px] uppercase font-bold text-slate-900 dark:text-white tracking-widest">Principal Signature</p>
                    </div>
                </div>
            </div>

            <!-- Sidebar -->
            <div id="sidebar-panel" class="w-full lg:w-72 space-y-4 no-print">
                <div class="p-6 bg-slate-900 text-white rounded-2xl space-y-5 shadow-xl">
                    <h3 class="text-xs font-black uppercase tracking-widest text-indigo-400">Settings</h3>
                    
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 block mb-1 uppercase">Watermark Name</label>
                        <input type="text" id="teacherInput" oninput="updateWatermark(this.value)" placeholder="Teacher Name" class="w-full bg-slate-800 border-none rounded-lg px-3 py-2 text-sm focus:ring-1 focus:ring-indigo-500">
                    </div>

                    <div>
                        <label class="text-[10px] font-bold text-slate-400 block mb-1 uppercase">Pass Mark Threshold</label>
                        <input type="number" id="passCriteriaInput" value="140" oninput="updatePassCriteria(this.value)" class="w-full bg-slate-800 border-none rounded-lg px-3 py-2 text-sm focus:ring-1 focus:ring-indigo-500">
                    </div>

                    <div class="grid grid-cols-1 gap-2">
                        <button onclick="exportToPDF()" class="w-full bg-indigo-600 py-3 rounded-xl font-bold shadow-lg shadow-indigo-500/30 hover:bg-indigo-500 transition-colors">Export PDF</button>
                        <button onclick="exportToCSV()" class="w-full bg-emerald-600 py-3 rounded-xl font-bold shadow-lg shadow-emerald-500/30 hover:bg-emerald-500 transition-colors">Export CSV (Excel)</button>
                    </div>
                </div>
                
                <div class="p-4 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl flex flex-col gap-2">
                    <button onclick="saveBackup()" class="text-xs font-bold py-2 bg-slate-50 dark:bg-slate-800 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700">Download JSON</button>
                    <label class="text-xs font-bold py-2 bg-slate-50 dark:bg-slate-800 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 text-center cursor-pointer">Restore JSON<input type="file" class="hidden" onchange="loadBackup(event)"></label>
                </div>
            </div>
        </div>
    </div>

    <script>
        const tableBody = document.getElementById('tableBody');
        const STORAGE_KEY = 'nds_report_data_v8';
        const SETTINGS_KEY = 'nds_report_settings_v8';
        
        let passMark = parseInt(localStorage.getItem(SETTINGS_KEY)) || 140;
        document.getElementById('passCriteriaInput').value = passMark;

        let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [
            { type: 'section', name: 'CLASS XI - B', p1:'', hy:'', p2:'', an:'' }
        ];

        function toggleDarkMode() { document.documentElement.classList.toggle('dark'); }

        function updateWatermark(val) {
            document.getElementById('targetWatermarkName').innerText = val ? `Prepared by: ${val}` : "Prepared by: Teacher Name";
        }

        function updatePassCriteria(val) {
            passMark = parseInt(val) || 0;
            localStorage.setItem(SETTINGS_KEY, passMark);
            renderTable();
        }

        function renderTable() {
            tableBody.innerHTML = '';
            data.forEach((row, idx) => {
                const tr = document.createElement('tr');
                tr.className = row.type === 'section' ? "section-row" : "student-row";
                
                if (row.type === 'section') {
                    tr.innerHTML = `
                        <td class="px-4 py-3 text-center no-print"><div class="drag-handle">⠿</div></td>
                        <td class="px-4 py-3 text-center text-[10px] font-bold text-slate-400">SEC</td>
                        <td colspan="5" class="px-4 py-2">
                            <input type="text" value="${row.name}" oninput="updateValue(${idx}, 'name', this.value)" placeholder="SECTION NAME" class="data-input w-full bg-transparent border-none font-black text-sm tracking-widest text-indigo-600 dark:text-indigo-400 uppercase focus:ring-0">
                        </td>
                        <td class="bg-slate-100/30 dark:bg-slate-800/50"></td>
                        <td class="px-4 py-2 no-print text-center"><button onclick="removeRow(${idx})" class="text-slate-300 hover:text-rose-500">×</button></td>
                    `;
                } else {
                    const total = (parseFloat(row.p1)||0) + (parseFloat(row.hy)||0) + (parseFloat(row.p2)||0) + (parseFloat(row.an)||0);
                    tr.innerHTML = `
                        <td class="px-4 py-3 text-center no-print"><div class="drag-handle">⠿</div></td>
                        <td class="px-4 py-3 text-center text-xs font-mono text-slate-300">${idx + 1}</td>
                        <td class="px-4 py-2">
                            <input type="text" value="${row.name}" oninput="updateValue(${idx}, 'name', this.value)" placeholder="Student Name" class="data-input w-full bg-slate-50 dark:bg-slate-800/50 rounded px-2 py-1.5 text-sm font-bold">
                        </td>
                        <td class="px-1 py-2 text-center"><input type="number" step="0.5" value="${row.p1}" oninput="updateValue(${idx}, 'p1', this.value)" class="data-input w-16 bg-slate-50 dark:bg-slate-800/50 rounded px-1 py-1.5 text-center text-sm"></td>
                        <td class="px-1 py-2 text-center"><input type="number" step="0.5" value="${row.hy}" oninput="updateValue(${idx}, 'hy', this.value)" class="data-input w-16 bg-slate-50 dark:bg-slate-800/50 rounded px-1 py-1.5 text-center text-sm"></td>
                        <td class="px-1 py-2 text-center"><input type="number" step="0.5" value="${row.p2}" oninput="updateValue(${idx}, 'p2', this.value)" class="data-input w-16 bg-slate-50 dark:bg-slate-800/50 rounded px-1 py-1.5 text-center text-sm"></td>
                        <td class="px-1 py-2 text-center"><input type="number" step="0.5" value="${row.an}" oninput="updateValue(${idx}, 'an', this.value)" class="data-input w-16 bg-slate-50 dark:bg-slate-800/50 rounded px-1 py-1.5 text-center text-sm"></td>
                        <td class="px-4 py-2 text-center font-black text-sm bg-slate-50/50 dark:bg-slate-800 ${total >= passMark ? 'text-indigo-600' : 'text-rose-500'}">${total.toFixed(1).replace(/\.0$/, '')}</td>
                        <td class="px-4 py-2 no-print text-center"><button onclick="removeRow(${idx})" class="text-slate-300 hover:text-rose-500">×</button></td>
                    `;
                }
                tableBody.appendChild(tr);
            });
            updateStats();
        }

        function updateValue(idx, key, val) {
            data[idx][key] = val;
            save();
            updateStats();
            if (data[idx].type === 'student') {
                const total = (parseFloat(data[idx].p1)||0) + (parseFloat(data[idx].hy)||0) + (parseFloat(data[idx].p2)||0) + (parseFloat(data[idx].an)||0);
                const cells = tableBody.children[idx].cells;
                const totalCell = cells[cells.length - 2];
                totalCell.innerText = total.toFixed(1).replace(/\.0$/, '');
                totalCell.className = `px-4 py-2 text-center font-black text-sm bg-slate-50/50 dark:bg-slate-800 ${total >= passMark ? 'text-indigo-600' : 'text-rose-500'}`;
            }
        }

        function addRow(type) {
            data.push({ type, name: '', p1:'', hy:'', p2:'', an:'' });
            renderTable(); save();
        }

        function removeRow(idx) { data.splice(idx, 1); renderTable(); save(); }

        function updateStats() {
            const students = data.filter(r => r.type === 'student' && r.name.trim() !== '');
            let pass = 0, totalMarks = 0;
            students.forEach(s => {
                const total = (parseFloat(s.p1)||0) + (parseFloat(s.hy)||0) + (parseFloat(s.p2)||0) + (parseFloat(s.an)||0);
                if (total >= passMark) pass++;
                totalMarks += total;
            });
            document.getElementById('statTotal').innerText = students.length;
            document.getElementById('statPass').innerText = pass;
            document.getElementById('statFail').innerText = students.length - pass;
            document.getElementById('statAvg').innerText = students.length ? (totalMarks / students.length).toFixed(1) : "0.0";
        }

        function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }

        async function exportToPDF() {
            const element = document.body;
            const wasDark = document.documentElement.classList.contains('dark');
            document.documentElement.classList.remove('dark');
            element.classList.add('pdf-export-mode');
            const opt = {
                margin: [10, 5, 10, 5],
                filename: 'NDS_Annual_Report.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true, logging: false },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' },
                pagebreak: { mode: 'avoid-all' }
            };
            try { await html2pdf().set(opt).from(element).save(); }
            finally {
                element.classList.remove('pdf-export-mode');
                if (wasDark) document.documentElement.classList.add('dark');
            }
        }

        function exportToCSV() {
            let csv = "Type,Name,P1,HY,P2,Annual,Total,Status\n";
            data.forEach(r => {
                const total = (parseFloat(r.p1)||0) + (parseFloat(r.hy)||0) + (parseFloat(r.p2)||0) + (parseFloat(r.an)||0);
                const status = r.type === 'student' ? (total >= passMark ? "Pass" : "Fail") : "-";
                csv += `${r.type.toUpperCase()},"${r.name}",${r.p1||0},${r.hy||0},${r.p2||0},${r.an||0},${total},${status}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `NDS_Report_Export.csv`; a.click();
        }

        function saveBackup() {
            const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `nds_backup.json`; a.click();
        }

        function loadBackup(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const imported = JSON.parse(e.target.result);
                    data = imported.map(item => {
                        const isSection = !item.p1 && !item.hy && !item.p2 && !item.an;
                        return { ...item, type: item.type || (isSection ? 'section' : 'student') };
                    });
                    save(); renderTable();
                } catch (err) { alert("Invalid Backup File"); }
            };
            reader.readAsText(file);
        }

        renderTable();
    </script>
</body>
</html>
